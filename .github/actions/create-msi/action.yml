name: Create MSI Installer
description: Builds an MSI installer using Advanced Installer

inputs:
  version:
    description: Version number (without v prefix)
    required: true
  advinst-license:
    description: Advanced Installer license key
    required: true

runs:
  using: composite
  steps:
    - name: Create artifacts directory
      shell: pwsh
      run: New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null

    - name: Build MSI
      uses: caphyon/advinst-github-action@main
      with:
        advinst-license: ${{ inputs.advinst-license }}
        aip-path: .github/Cursor_Installer_Creator.aip
        aip-build-name: DefaultBuild
        aip-output-dir: ./artifacts
        aip-commands: |
          SetVersion ${{ inputs.version }}
